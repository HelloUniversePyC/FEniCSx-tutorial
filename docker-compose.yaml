services:
  fenicsxtutorial:
    image: fenicsxtutorial
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - ./src:/root/workspace/src
    command: >
      jupyter lab --ip=0.0.0.0 --port=3000 --no-browser
      --allow-root --NotebookApp.token=''